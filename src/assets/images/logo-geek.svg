<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="logoGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形背景 -->
  <rect width="80" height="80" rx="16" fill="#0a0e27"/>
  <!-- 花括号 &lt;/&gt; 风格Logo -->
  <text x="12" y="50" fill="url(#logoGlow)" font-family="monospace" font-size="32" font-weight="bold">&lt;F/&gt;</text>
  <!-- 底部装饰线 -->
  <line x1="15" y1="65" x2="65" y2="65" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
</svg>